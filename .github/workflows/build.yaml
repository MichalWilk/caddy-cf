name: Build and push Caddy image

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: caddy-cf
  UPSTREAM_IMAGE: docker.io/library/caddy:2-alpine

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream image info
        id: upstream
        run: |
          info=$(skopeo inspect --authfile ~/.docker/config.json "docker://$UPSTREAM_IMAGE")
          {
            echo "digest<<EOF"
            echo "$info" | jq -r '.Digest'
            echo "EOF"
            echo "version<<EOF"
            echo "$info" | jq -r '.Labels["org.opencontainers.image.version"]'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if rebuild needed
        if: github.event_name == 'schedule'
        id: check
        env:
          UPSTREAM_DIGEST: ${{ steps.upstream.outputs.digest }}
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/caddy-cf:latest
        run: |
          current=$(skopeo inspect --authfile ~/.docker/config.json "docker://$IMAGE_REF" \
            2>/dev/null | jq -r '.Labels["caddy.upstream.digest"] // empty' || true)
          if [ -n "$current" ] && [ "$UPSTREAM_DIGEST" = "$current" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Upstream unchanged ($UPSTREAM_DIGEST), skipping build"
          else
            echo "Upstream changed: $current -> $UPSTREAM_DIGEST"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip != 'true'

      - uses: docker/metadata-action@v5
        if: steps.check.outputs.skip != 'true'
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.upstream.outputs.version }}-alpine

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.skip != 'true'
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            caddy.upstream.digest=${{ steps.upstream.outputs.digest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
